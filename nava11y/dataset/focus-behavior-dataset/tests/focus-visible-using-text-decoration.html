<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>
      Accessibility tools audit test - Focus visible using text decoration - GDS
      accessibility team
    </title>
    <script src="../assets/javascript/jquery-1.12.0.min.js"></script>
    <script src="../assets/javascript/main.js"></script>
    <link rel="stylesheet" href="../assets/stylesheets/tests.css" />
    <style>
      .text-dec-focus {
        text-decoration: none;
        border: 1px solid #ccc;
        padding: 10px 20px;
        background: #fff;
        cursor: pointer;
      }
      .text-dec-focus:focus {
        outline: none;
        text-decoration: underline;
        text-decoration-thickness: 2px;
        text-decoration-color: #000;
      }
    </style>
  </head>
  <body>
    <h1>Focus visible using text decoration</h1>
    <main>
      <button class="text-dec-focus">Button with underline on focus</button>
    </main>
  </body>
</html>
