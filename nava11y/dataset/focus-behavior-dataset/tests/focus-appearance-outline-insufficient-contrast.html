<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>
      Accessibility tools audit test - Focus appearance outline sufficient
      contrast - GDS accessibility team
    </title>
    <script src="../assets/javascript/jquery-1.12.0.min.js"></script>
    <script src="../assets/javascript/main.js"></script>
    <link rel="stylesheet" href="../assets/stylesheets/tests.css" />
    <style>
      .aaa-outline {
        border: 1px solid #ccc;
        padding: 10px 20px;
        background: #fff;
        cursor: pointer;
      }
      .aaa-outline:focus {
        outline: 2px solid #999;
      }
    </style>
  </head>
  <body>
    <h1>Focus appearance outline with insufficient contrast</h1>
    <main>
      <p>
        The button below has a 2px outline on focus, but its colour (#999 on
        white) only achieves ~2.85:1 contrast, below the 3:1 minimum required by
        WCAG 2.4.13 (AAA).
      </p>
      <button class="aaa-outline">Button with low-contrast 2px outline</button>
    </main>
  </body>
</html>
