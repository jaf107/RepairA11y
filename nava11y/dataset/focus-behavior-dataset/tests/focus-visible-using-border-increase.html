<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>
      Accessibility tools audit test - Focus visible using border increase - GDS
      accessibility team
    </title>
    <script src="../assets/javascript/jquery-1.12.0.min.js"></script>
    <script src="../assets/javascript/main.js"></script>
    <link rel="stylesheet" href="../assets/stylesheets/tests.css" />
    <style>
      .border-focus {
        border: 1px solid #ccc;
        padding: 10px 20px;
        background: #fff;
        cursor: pointer;
      }
      .border-focus:focus {
        outline: none;
        border: 3px solid #000;
      }
    </style>
  </head>
  <body>
    <h1>Focus visible using border increase</h1>
    <main>
      <button class="border-focus">Button with border increase on focus</button>
    </main>
  </body>
</html>
