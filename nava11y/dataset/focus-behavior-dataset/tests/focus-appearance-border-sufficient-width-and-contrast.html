<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>
      Accessibility tools audit test - Focus appearance border with sufficient
      width and contrast - GDS accessibility team
    </title>
    <script src="../assets/javascript/jquery-1.12.0.min.js"></script>
    <script src="../assets/javascript/main.js"></script>
    <link rel="stylesheet" href="../assets/stylesheets/tests.css" />
    <style>
      .aaa-border {
        border: 1px solid #ccc;
        padding: 10px 20px;
        background: #fff;
        cursor: pointer;
      }
      .aaa-border:focus {
        outline: none;
        border: 3px solid #000;
      }
    </style>
  </head>
  <body>
    <h1>Focus appearance border with sufficient width and contrast</h1>
    <main>
      <p>
        The button below gains a 3px solid black border on focus (increase of
        2px). Width ≥2px and contrast 21:1 — meets WCAG 2.4.13 (AAA).
      </p>
      <button class="aaa-border">Button with thick high-contrast border</button>
    </main>
  </body>
</html>
