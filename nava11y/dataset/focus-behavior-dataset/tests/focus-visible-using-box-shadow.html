<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>
      Accessibility tools audit test - Focus visible using box shadow - GDS
      accessibility team
    </title>
    <script src="../assets/javascript/jquery-1.12.0.min.js"></script>
    <script src="../assets/javascript/main.js"></script>
    <link rel="stylesheet" href="../assets/stylesheets/tests.css" />

    <h1>Focus visible using box shadow</h1>
    <main>
      <button class="box-shadow-focus">
        Button with box-shadow focus indicator
      </button>
    </main>
